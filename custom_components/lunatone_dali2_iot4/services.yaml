# Services for Lunatone DALI-2 IoT integration

rescan_devices:
  name: Scan for DALI devices
  description: >-
    Trigger the gateway's own device scan (no re-addressing). New devices
    appear automatically after the scan finishes.
  fields: {}

step_up:
  name: Step brightness up
  description: Increase brightness by one step.
  target:
    entity:
      integration: lunatone_dali2_iot4
      domain: light

step_down:
  name: Step brightness down
  description: Decrease brightness by one step.
  target:
    entity:
      integration: lunatone_dali2_iot4
      domain: light

recall_max:
  name: Recall maximum level
  description: Turn light on to maximum brightness.
  target:
    entity:
      integration: lunatone_dali2_iot4
      domain: light

set_feedback_led:
  name: Set feedback LED
  description: >-
    Control the indicator LED of a DALI-2 input instance, addressed by line,
    short address and instance number.
  fields:
    line:
      name: DALI line
      description: Line the input device is connected to (0-3 on an IoT4).
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 15
          mode: box
    address:
      name: Device address
      description: DALI-2 short address of the input device (0-63).
      required: true
      example: 5
      selector:
        number:
          min: 0
          max: 63
          mode: box
    instance:
      name: Instance
      description: Instance number of the button (e.g. 0-3 on a 4-button coupler).
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 31
          mode: box
    state:
      name: LED state
      description: Turn the feedback LED on or off.
      required: true
      example: true
      selector:
        boolean:
