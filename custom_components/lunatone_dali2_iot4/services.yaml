# Services for Lunatone DALI-2 IoT integration

rescan_devices:
  name: Scan for DALI devices
  description: >-
    Trigger the gateway's own device scan (no re-addressing). New devices
    appear automatically after the scan finishes.
  fields: {}

refresh_input_names:
  name: Refresh input device names
  description: >-
    Re-read the names (Cockpit "Device Description") of all DALI-2 input
    devices from the bus. Use this to repair switch names that show garbled or
    truncated text. Names you renamed by hand are left unchanged.
  fields: {}

step_up:
  name: Step brightness up
  description: Increase brightness by one step.
  target:
    entity:
      integration: lunatone_dali2_iot4
      domain: light

step_down:
  name: Step brightness down
  description: Decrease brightness by one step.
  target:
    entity:
      integration: lunatone_dali2_iot4
      domain: light

recall_max:
  name: Recall maximum level
  description: Turn light on to maximum brightness.
  target:
    entity:
      integration: lunatone_dali2_iot4
      domain: light

set_feedback_led:
  name: Set feedback LED
  description: >-
    Control the indicator LED of a DALI-2 input instance, addressed by line,
    short address and instance number.
  fields:
    line:
      name: DALI line
      description: Line the input device is connected to (0-3 on an IoT4).
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 15
          mode: box
    address:
      name: Device address
      description: DALI-2 short address of the input device (0-63).
      required: true
      example: 5
      selector:
        number:
          min: 0
          max: 63
          mode: box
    instance:
      name: Instance
      description: Instance number of the button (e.g. 0-3 on a 4-button coupler).
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 31
          mode: box
    state:
      name: LED state
      description: Turn the feedback LED on or off.
      required: true
      example: true
      selector:
        boolean:

recall_scene:
  name: Recall scene
  description: Recall a DALI scene (0-15) on a light, group or broadcast entity.
  target:
    entity:
      integration: lunatone_dali2_iot4
      domain: light
  fields:
    scene:
      name: Scene
      description: DALI scene number (0-15).
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 15
          mode: box
    fade_time:
      name: Fade time
      description: Optional fade time in seconds for the scene transition.
      required: false
      example: 2.0
      selector:
        number:
          min: 0
          max: 600
          step: 0.1
          unit_of_measurement: s
          mode: box

store_scene:
  name: Store scene
  description: >-
    Store the current level of a light, group or broadcast target into a
    DALI scene (0-15).
  target:
    entity:
      integration: lunatone_dali2_iot4
      domain: light
  fields:
    scene:
      name: Scene
      description: DALI scene number (0-15).
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 15
          mode: box

set_scene_level:
  name: Set scene level
  description: >-
    Write the stored value of a DALI scene (0-15) on a device light directly,
    without changing the current light state. Omit the level to clear the
    scene from the device.
  target:
    entity:
      integration: lunatone_dali2_iot4
      domain: light
  fields:
    scene:
      name: Scene
      description: DALI scene number (0-15).
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 15
          mode: box
    level:
      name: Level
      description: Brightness percentage (0-100) to store for this scene.
      required: false
      example: 75
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: box
