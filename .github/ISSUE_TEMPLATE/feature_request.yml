name: Feature Request
description: Suggest a new feature or enhancement for the Lunatone DALI-2 IoT4 Gateway integration
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when...

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: I would like the integration to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: I've also thought about...

  - type: dropdown
    id: feature_area
    attributes:
      label: Feature Area
      description: Which area of the integration does this feature relate to?
      options:
        - Lights (brightness, color temperature)
        - Binary Sensors (buttons, occupancy)
        - Sensors (illuminance, colour)
        - Groups and broadcast
        - Configuration and setup
        - Automation and services
        - Device discovery
        - Real-time events
        - Other

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Describe a specific use case for this feature
      placeholder: |
        I want to use this feature to...
        This would allow me to...

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples about the feature request here.
